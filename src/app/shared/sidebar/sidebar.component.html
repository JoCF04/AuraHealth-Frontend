<aside class="sidebar" [class.open]="isOpen">

  <div class="sidebar-logo">
    <img [src]="theme.isDark() ? 'assets/logo3-dark.png' : 'assets/logo3.png'" alt="AuraHealth" style="height:50px;width:auto;"/>
    <span>AuraHealth</span>
  </div>

  <nav class="sidebar-nav">
    <a routerLink="/app/dashboard" routerLinkActive="active" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      {{ 'nav.inicio' | translate }}
    </a>
    <a routerLink="/app/recordatorios" routerLinkActive="active" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      {{ 'nav.recordatorios' | translate }}
    </a>
    <a routerLink="/app/recomendaciones" routerLinkActive="active" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
      </svg>
      {{ 'nav.recomendaciones' | translate }}
    </a>
    <a routerLink="/app/perfil" routerLinkActive="active" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      {{ 'nav.perfil' | translate }}
    </a>
    <a routerLink="/app/partner" routerLinkActive="active" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      {{ 'nav.partner' | translate }}
    </a>
    <div class="nav-divider"></div>
  </nav>

  <div class="sidebar-footer">

    <div style="font-size:.75rem;color:var(--text-muted);margin-bottom:8px;padding:0 2px;">
      {{ 'nav.accesibilidad' | translate }}
    </div>

    <div class="a11y-bar">
      <button class="a11y-btn" (click)="theme.decreaseFontSize()">A-</button>
      <button class="a11y-btn" (click)="theme.increaseFontSize()">A+</button>
      <button class="toggle-dark" [class.on]="theme.isDark()" (click)="theme.toggleDark()"></button>
      <span style="font-size:.75rem;color:var(--text-muted);">{{ 'nav.oscuro' | translate }}</span>
    </div>

    <!-- Selector de idioma -->
    <div style="display:flex;gap:6px;margin-top:10px;">
      <button class="a11y-btn"
        [style.background]="isLang('es') ? 'var(--blue-dark)' : ''"
        [style.color]="isLang('es') ? '#fff' : ''"
        [style.border-color]="isLang('es') ? 'var(--blue-dark)' : ''"
        (click)="setLang('es')">ES</button>
      <button class="a11y-btn"
        [style.background]="isLang('en') ? 'var(--blue-dark)' : ''"
        [style.color]="isLang('en') ? '#fff' : ''"
        [style.border-color]="isLang('en') ? 'var(--blue-dark)' : ''"
        (click)="setLang('en')">EN</button>
    </div>

    <div class="nav-divider" style="margin:12px 0"></div>

    <a routerLink="/" class="nav-item" style="color:#e05050;">
      <svg viewBox="0 0 24 24" fill="none" stroke="#e05050" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      {{ 'nav.cerrar_sesion' | translate }}
    </a>

  </div>
</aside>
