<div class="login-page">
  <div class="login-bg"></div>
  <div class="login-overlay"></div>

  <main class="login-main">
  <div class="login-card">

    <div class="card-brand" style="justify-content: center;">
      <img src="assets/logo2.png" alt="AuraHealth" style="height: 80px; width: auto;"/>
    </div>

    <h2>{{ 'login.titulo' | translate }}</h2>
    <p class="login-subtitle">{{ 'login.subtitulo' | translate }}</p>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [placeholder]="'login.email_ph' | translate" [(ngModel)]="email"/>
    </div>
    <div class="form-group">
      <label>{{ 'login.password_label' | translate }}</label>
      <input type="password" [placeholder]="'login.password_ph' | translate" [(ngModel)]="password"/>
    </div>

    <button class="btn-login" (click)="login()">{{ 'login.btn' | translate }}</button>

    <div class="divider">{{ 'login.o_inicia' | translate }}</div>

    <div class="social-btns">
      <button class="btn-social" (click)="login()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google
      </button>
      <button class="btn-social" (click)="login()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2">
          <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
        </svg>
        Facebook
      </button>
    </div>

    <p class="register-link">
      {{ 'login.sin_cuenta' | translate }} <a routerLink="/register">{{ 'login.crea' | translate }}</a>
    </p>

  </div>
  </main>
</div>
