<main class="register-main">
  <div class="register-card">
    <div class="card-logo" style="justify-content: center;">
      <img src="assets/logo2.png" alt="AuraHealth" style="height: 80px; width: auto;"/>
    </div>
    <h2>{{ 'register.titulo' | translate }}</h2>
    <p class="subtitle">{{ 'register.subtitulo' | translate }}</p>

    <div class="social-btns">
      <button class="btn-social"><svg width="17" height="17" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>Google</button>
      <button class="btn-social"><svg width="17" height="17" viewBox="0 0 24 24" fill="#1877F2"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>Facebook</button>
    </div>
    <div class="or-divider"><span>{{ 'register.o_email' | translate }}</span></div>

    <form (ngSubmit)="submit()" #f="ngForm" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label for="nombre">{{ 'register.nombre' | translate }}</label>
          <input type="text" id="nombre" placeholder="John" [(ngModel)]="nombre" name="nombre" autocomplete="given-name" required/>
        </div>
        <div class="form-group">
          <label for="apellido">{{ 'register.apellido' | translate }}</label>
          <input type="text" id="apellido" placeholder="Doe" [(ngModel)]="apellido" name="apellido" autocomplete="family-name" required/>
        </div>
      </div>

      <div class="form-group">
        <label>{{ 'register.fecha_nac' | translate }}</label>
        <input type="date" [(ngModel)]="fechaNac" name="fechaNac" required/>
      </div>

      <div class="form-group">
        <label>{{ 'register.email' | translate }}</label>
        <input type="email" placeholder="johndoe@gmail.com" [(ngModel)]="email" name="email" required/>
      </div>

      <div class="form-group">
        <label>{{ 'register.sexo' | translate }}</label>
        <select [(ngModel)]="sexo" name="sexo">
          <option value="masculino">{{ 'register.masculino' | translate }}</option>
          <option value="femenino">{{ 'register.femenino' | translate }}</option>
          <option value="otro">{{ 'register.otro' | translate }}</option>
        </select>
      </div>

      <div class="form-group">
        <label>{{ 'register.password_label' | translate }}</label>
        <div class="input-wrap">
          <input [type]="showPw ? 'text' : 'password'" [placeholder]="'register.password_ph' | translate"
            [(ngModel)]="password" name="password" (input)="onPasswordInput()" required/>
          <button type="button" class="toggle-pw" (click)="showPw=!showPw">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              @if (!showPw) {
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              } @else {
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              }
            </svg>
          </button>
        </div>
        <div class="strength-bar">
          @for (i of [1,2,3,4]; track i) {
            <div class="strength-seg" [style.background]="getSegColor(i)"></div>
          }
        </div>
        @if (strengthLabel) {
          <div class="strength-label" [style.color]="strengthColors[strengthScore-1]">{{ strengthLabel }}</div>
        }
      </div>

      <div class="form-group">
        <label>{{ 'register.confirm_label' | translate }}</label>
        <div class="input-wrap">
          <input [type]="showConfirm ? 'text' : 'password'" [placeholder]="'register.confirm_ph' | translate"
            [(ngModel)]="confirmPw" name="confirmPw" (input)="checkMatch()" required/>
          <button type="button" class="toggle-pw" (click)="showConfirm=!showConfirm">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="match-hint" [ngClass]="matchClass">{{ matchHint }}</div>
      </div>

      <div class="terms-check">
        <input type="checkbox" id="terms" [(ngModel)]="terms" name="terms"/>
        <label for="terms">
          {{ 'register.terms1' | translate }}
          <a href="#">{{ 'register.terms_uso' | translate }}</a>
          {{ 'register.terms_y' | translate }}
          <a href="#">{{ 'register.terms_privacidad' | translate }}</a>
          {{ 'register.terms_de' | translate }}
        </label>
      </div>

      <button type="submit" class="btn-register" [class.success]="sending">
        @if (!sending) {
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
          {{ 'register.btn' | translate }}
        } @else {
          {{ 'register.enviando' | translate }}
        }
      </button>
    </form>

    <p class="login-link">
      {{ 'register.ya_cuenta' | translate }} <a routerLink="/login">{{ 'register.inicia' | translate }}</a>
    </p>
  </div>
</main>
